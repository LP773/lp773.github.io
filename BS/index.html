<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bill Splitter</title>
        <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1 style="text-align:center; font-size:36px; font-weight:800; margin-bottom:0;">💰 Bill Splitter</h1>
            <button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode" aria-label="Toggle dark mode">
                <div class="dark-toggle-knob" id="darkToggleKnob">☀️</div>
            </button>
        </div>
        
        <div class="controls">
            <button class="btn-add-person" onclick="addPerson()">+ Add Person</button>
            <button class="btn-add-person btn-add-shared" onclick="addSharedItem()">+ Add Shared Item</button>
            <button class="btn-export" onclick="exportImage()">📸 Export Summary</button>
        </div>
        
        <!-- Mobile Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('people')">👥 People</button>
            <button class="tab" onclick="switchTab('shared')">🍽️ Shared</button>
            <button class="tab" onclick="switchTab('summary')">📊 Summary</button>
        </div>
        
        <div class="stats-bar" id="statsBar" style="display: none;">
            <div class="stat">
                <div class="stat-value" id="peopleCount">0</div>
                <div class="stat-label">People</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="itemsCount">0</div>
                <div class="stat-label">Items</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalAmount">$0.00</div>
                <div class="stat-label">Total</div>
            </div>
        </div>
        
        <div class="extras" id="extrasBar">
            <div class="extra-field">
                <label>💵 Tax ($)</label>
                <input type="number" id="taxAmount" placeholder="0.00" step="0.01" value="0" oninput="updateAllPersonTotals(); renderSummary();">
            </div>
            <div class="extra-field">
                <label>🙏 Tip ($)</label>
                <input type="number" id="tipAmount" placeholder="0.00" step="0.01" value="0" oninput="updateAllPersonTotals(); renderSummary();">
            </div>
            <div class="toggle-field">
                <label>✂️ Split Method</label>
                <div class="toggle-container">
                    <button class="toggle-option active" id="proportionalBtn" onclick="setSplitMethod('proportional')">
                        Proportional
                    </button>
                    <button class="toggle-option" id="evenBtn" onclick="setSplitMethod('even')">
                        Even Split
                    </button>
                </div>
            </div>
        </div>
        
        <!-- People Tab Content -->
        <div class="tab-content active" id="peopleTab" data-section="people">
            <h2 class="section-header">👥 People</h2>
            <div class="people-grid people-only-grid" id="peopleGrid" data-grid="people"></div>
        </div>
        
        <!-- Shared Tab Content -->
        <div class="tab-content" id="sharedTab" data-section="shared">
            <div class="people-grid shared-only-grid" id="sharedGrid" data-grid="shared"></div>
        </div>
        
        <!-- Summary Tab Content -->
        <div class="tab-content" id="summaryTab" data-section="summary">
            <div class="extras" id="extrasBarMobile" style="display:none;"></div>
            <div class="summary" id="summary"></div>
        </div>
    </div>
    
    <!-- FAB for mobile -->
    <button class="fab" onclick="quickAdd()" title="Quick Add">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:auto;">
            <circle cx="20" cy="20" r="20" fill="#4CAF50"/>
            <rect x="18" y="10" width="4" height="20" rx="2" fill="white"/>
            <rect x="10" y="18" width="20" height="4" rx="2" fill="white"/>
        </svg>
    </button>
    
    <!-- Bottom bar for mobile -->
    <div class="bottom-bar">
        <div class="bottom-bar-content">
            <div class="bottom-bar-info">
                <div class="bottom-bar-label">Total Bill</div>
                <div class="bottom-bar-amount" id="bottomBarTotal">$0.00</div>
            </div>
            <button class="bottom-bar-button" onclick="exportImage()">📸 Export</button>
        </div>
    </div>
    
        <script src="script.js"></script>
</body>
</html>
